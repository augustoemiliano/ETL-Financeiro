services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://etl_user:etl_pass@postgres:5432/etl_db
      ENVIRONMENT: development
      SCHEDULER_RUN_TIME: "02:05"
      FX_API_BASE_URL: https://api.frankfurter.app
      CSV_INPUT_DIR: data/samples
      XLSX_INPUT_DIR: data/samples
    volumes:
      - ./logs:/app/logs:rw,z
      - ./reports:/app/reports:rw,z
      # CSV/XLSX: `:z` relabel SELinux (Fedora) para o container poder ler o bind mount.
      - ./data:/app/data:ro,z
    ports:
      - "8000:8000"

  scheduler:
    profiles: ["cron"]
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://etl_user:etl_pass@postgres:5432/etl_db
      SCHEDULER_RUN_TIME: "02:05"
      CSV_INPUT_DIR: data/samples
      XLSX_INPUT_DIR: data/samples
      FX_API_BASE_URL: https://api.frankfurter.app
    volumes:
      - ./logs:/app/logs:rw,z
      - ./reports:/app/reports:rw,z
      # CSV/XLSX: `:z` relabel SELinux (Fedora) para o container poder ler o bind mount.
      - ./data:/app/data:ro,z
    command: ["scheduler"]

volumes:
  postgres-data:
